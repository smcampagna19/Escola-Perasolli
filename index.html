<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Escolar - Escola Perasoli</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f2eff8;
      color: #221b2f;
    }

    header {
      background: linear-gradient(to bottom, #140d1f, #2a1740);
      color: white;
      text-align: center;
      padding: 30px 20px;
    }

    header h1 {
      margin: 0 0 6px;
      font-size: 32px;
    }

    header p {
      margin: 0;
      color: #d8cdef;
      font-size: 16px;
    }

    nav {
      background-color: #241336;
      text-align: center;
      padding: 12px;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 0 12px;
      font-size: 15px;
    }

    nav a:hover {
      text-decoration: underline;
    }

    main {
      max-width: 950px;
      margin: 20px auto;
      padding: 0 15px 20px;
    }

    section {
      background-color: white;
      margin-bottom: 20px;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(34, 20, 51, 0.08);
    }

    h2 {
      margin-top: 0;
      color: #341b52;
    }

    .info p,
    .contato p,
    .nara p {
      line-height: 1.5;
      margin: 8px 0;
    }

    @media (max-width: 600px) {
      header h1 {
        font-size: 26px;
      }

      nav a {
        display: inline-block;
        margin: 5px 8px;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>Portal Escolar</h1>
    <p>Escola Perasoli</p>
  </header>

  <nav>
    <a href="#inicio">Início</a>
    <a href="#cursos">Cursos</a>
    <a href="#informacoes">Informações</a>
    <a href="#contato">Contato</a>
    <a href="#nara">Nara</a>
  </nav>

  <main>
